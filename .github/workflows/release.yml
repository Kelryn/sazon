name: Publicar release (Sazón)

# Construye el .exe (PyInstaller) y el instalador (Inno Setup) en un runner
# Windows y los adjunta a la Release al hacer push de un tag vX.Y.Z.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# La app (Fase 11) consulta la API de releases y avisa de la nueva version.
# Nota: el .exe de CI NO incluye el catalogo (data/menu.db es un artefacto local,
# no codigo); en el primer arranque el usuario lo descarga desde la pestaña
# Catalogo. Para incluirlo, sube data/menu.db como artefacto antes de empaquetar.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # crear la Release y subir assets

jobs:
  build:
    runs-on: windows-latest
    # El contexto `secrets` NO se puede usar en un `if:` (GitHub lo rechaza al
    # parsear el workflow -> falla en 0s). Se expone como env del job y el paso
    # de firma comprueba `env.SIGNING_CERT_BASE64`, que sí es valido en `if`.
    env:
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Construir el ejecutable
        run: pyinstaller --clean --noconfirm menu-app.spec

      - name: Instalar Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Construir el instalador
        shell: pwsh
        run: |
          $v = python -c "from menu_app.version import __version__; print(__version__)"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$v installer.iss

      # #74 Firmar el .exe/instalador: OPCIONAL e INACTIVO por defecto. Requiere un
      # certificado de firma de codigo REAL (comprado a una CA; Authenticode). Para
      # activarlo: sube el .pfx en base64 como secret SIGNING_CERT_BASE64 y su clave
      # como SIGNING_CERT_PASSWORD (Settings -> Secrets and variables -> Actions).
      # Sin esos secrets, este paso no hace nada (se salta solo).
      - name: Firmar binarios (si hay certificado configurado)
        if: ${{ secrets.SIGNING_CERT_BASE64 != '' }}
        shell: pwsh
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          $bytes = [Convert]::FromBase64String($env:SIGNING_CERT_BASE64)
          [IO.File]::WriteAllBytes("cert.pfx", $bytes)
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1).FullName
          & $signtool sign /f cert.pfx /p $env:SIGNING_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 dist\Sazon.exe dist\Sazon-Setup.exe
          Remove-Item cert.pfx

      # #82 Checksums: SHA256SUMS.txt permite a la app VERIFICAR la descarga antes
      # de instalarla (protege de una descarga corrupta o manipulada).
      - name: Generar SHA256SUMS.txt
        shell: pwsh
        run: |
          $lineas = Get-ChildItem dist\Sazon.exe, dist\Sazon-Setup.exe | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          }
          $lineas | Set-Content -Encoding utf8 dist\SHA256SUMS.txt
          Get-Content dist\SHA256SUMS.txt

      - name: Publicar Release con los binarios
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Sazon.exe
            dist/Sazon-Setup.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
