name: Tests (Sazón)

# QA en CI (Lote 9, #93): corre la suite de tests en cada push/PR, no solo al
# publicar una release (eso ya lo hace release.yml al empaquetar el .exe).
# Excluye los tests marcados "live" (golpean la API real de Alcampo, ver
# tests/test_contract_live.py) para que el CI no dependa de la red externa.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias (incluido el grupo dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[playwright]"
          pip install pytest pytest-httpx pytest-cov hypothesis ruff mypy

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests (excluye los de contrato en vivo)
        run: pytest -m "not live" --cov=menu_app --cov-report=term-missing
